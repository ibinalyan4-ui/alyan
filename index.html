<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>معلومات التواصل</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      font-family:Tahoma, sans-serif;
    }

    .card{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(10px);
      padding:30px;
      border-radius:20px;
      width:350px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
      border:1px solid rgba(255,255,255,0.1);
      color:white;
      text-align:center;
    }

    .title{
      font-size:28px;
      margin-bottom:25px;
      color:#38bdf8;
      font-weight:bold;
    }

    .info{
      background:rgba(255,255,255,0.05);
      padding:15px;
      margin-bottom:15px;
      border-radius:12px;
      transition:0.3s;
      word-break:break-word;
    }

    .info:hover{
      transform:scale(1.03);
      background:rgba(255,255,255,0.1);
    }

    .label{
      color:#94a3b8;
      font-size:14px;
      margin-bottom:5px;
    }

    .value{
      font-size:18px;
      font-weight:bold;
      color:#f8fafc;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="title">معلومات التواصل</div>

    <div class="info">
      <div class="label">البريد الإلكتروني</div>
      <div class="value">ibinalyan4@gmail.com</div>
    </div>

    <div class="info">
      <div class="label">رقم الهاتف</div>
      <div class="value">+966552252552</div>
    </div>
  </div>

</body>
</html>
